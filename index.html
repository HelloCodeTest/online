<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Hopeful Story</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    body { display: flex; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 250px;
      min-width: 220px;
      padding: 60px 28px 60px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      border-right: 1px solid #1f1f1f;
    }
    .sidebar h1 { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.3; letter-spacing: -0.02em; }
    .sidebar h2 { font-size: 12px; font-weight: 400; color: #777; line-height: 1.9; letter-spacing: 0.01em; }
    .sidebar h3 { font-size: 11px; font-weight: 400; color: #484848; line-height: 2.1; letter-spacing: 0.02em; }
    .sidebar h3 a { color: #484848; text-decoration: none; transition: color 0.2s; }
    .sidebar h3 a:hover { color: #fff; }
    .divider { width: 28px; height: 1px; background: #222; }

    /* 사이드바 내 gif 이미지 */
    .sidebar .sidebar-img {
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 3px;
      background: #0d0d0d;
    }
    .sidebar .sidebar-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .main { flex: 1; padding: 60px 40px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px 20px;
    }

    .img-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
    }

    /* 이미지 래퍼 — hover overlay 기준점 */
    .img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 3px;
      background: #0d0d0d;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    /* hover: 이미지 어둡게 + 살짝 확대 */
    .img-block:hover .img-wrap img {
      transform: scale(1.03);
      opacity: 0.45;
    }

    /* hover overlay — 제목 텍스트 */
    .img-hover-title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.0);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .img-hover-title span {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      text-align: center;
      line-height: 1.55;
      letter-spacing: 0.01em;
    }
    .img-block:hover .img-hover-title { opacity: 1; }

    /* 이미지 아래 제목 — 20px */
    .img-block h1 {
      font-size: 20px;
      font-weight: 700;
      color: #000000;
      letter-spacing: 0.01em;
      line-height: 1.3;
    }

    @media (max-width: 1024px) {
      .sidebar { width: 180px; min-width: 180px; padding: 48px 20px 48px 28px; }
    }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        position: static; height: auto; width: 100%; min-width: unset;
        padding: 40px 24px 32px; border-right: none; border-bottom: 1px solid #1f1f1f;
        flex-direction: row; flex-wrap: wrap; gap: 16px; align-items: flex-start;
      }
      .sidebar h1 { width: 100%; font-size: 22px; }
      .sidebar h2 { width: 100%; }
      .divider { display: none; }
      .main { padding: 32px 24px; }
      .grid { gap: 20px 14px; }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h1>Our Hopeful Story</h1>
    <div class="divider"></div>
    <h2 style="color: #dcdcdc;">Writing Our Stories</h2>
    <h2 style="color: #dcdcdc">Here are our stories of moving forward with hope, not despair.</h2>
    <div class="divider"></div>
    <div>
      <!-- <h3><a href="mailto:info@ourhopefulstory.com">info@ourhopefulstory.com</a></h3> -->
      <h3>Seoul, South Korea </h3>
      <!-- <h3><a href="https://instagram.com" target="_blank">@mmmm</a></h3> -->
    </div>
    <div class="sidebar-img">
      <img src="images/7be4ec07-cda5-ead4-5bf3-84f555843337.gif" alt="OHSflag" />
    </div>
    <h3>2026 Our Hopeful Story. All Rights Reserved.</h3>

  
  </aside>

  <main class="main">
    <div class="grid">

      <a class="img-block" href="detail.html?id=1">
        <div class="img-wrap">
          <img src="images/story01/CambodiaMain.jpg" alt="Cambodia" />
          <div class="img-hover-title"><span>Building Bridges of Hope: Inspiring Encounters with Cambodian Children</span></div>
        </div>
        <h1>Story 01 </h1>
      </a>

      <a class="img-block" href="detail.html?id=2">
        <div class="img-wrap">
          <img src="images/story02/hello.jpg" alt="Easter" />
          <div class="img-hover-title"><span>Easter</span></div>
        </div>
        <h1>Story 02 </h1>
      </a>

    </div>
  </main>
 <script>
    /* ── 저작권 보호 JS ── */
 
    // 우클릭 차단
    document.addEventListener('contextmenu', e => e.preventDefault());
 
    // 키보드 단축키 차단 (Ctrl+S, Ctrl+C, Ctrl+U, Ctrl+P, F12 등)
    document.addEventListener('keydown', e => {
      const blocked = (
        (e.ctrlKey || e.metaKey) && ['s','c','u','p','a'].includes(e.key.toLowerCase()) ||
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()))
      );
      if (blocked) e.preventDefault();
    });
 
    // 드래그 차단
    document.addEventListener('dragstart', e => e.preventDefault());
 
    // 이미지 위 투명 오버레이 — img 태그의 pointer-events:none 보완
    document.querySelectorAll('img').forEach(img => {
      const wrap = img.parentElement;
      if (getComputedStyle(wrap).position === 'static') wrap.style.position = 'relative';
      const shield = document.createElement('div');
      shield.style.cssText = 'position:absolute;inset:0;z-index:1;';
      wrap.appendChild(shield);
    });
 
    // © 워터마크 콘솔 출력
    console.log('%c© Our Hopeful Story — All rights reserved.', 'color:#fff;background:#000;font-size:14px;padding:8px 16px;');
  </script>
</body>
</html>
